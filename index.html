
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历专家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2b4766;
            --text-main: #333333;
        }
        
        * {
            box-sizing: border-box;
        }

        /* 日夜切换全局过渡 */
        *,
        *::before,
        *::after {
            transition: background-color 0.35s ease, border-color 0.35s ease, color 0.2s ease, box-shadow 0.35s ease;
        }
        /* 排除动画和特殊元素 */
        .animate-spin, .animate-spin *,
        .sf-animate-fade-in, .sf-animate-slide-down,
        [class*="transition-all"] {
            transition-property: all;
        }
        /* 简历预览区不参与过渡（保持白底） */
        .resume-container, .resume-container * {
            transition: none !important;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f1f5f9;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 悬停/滚动时显示的细滚动条 */
        .auto-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }
        .auto-scrollbar:hover {
            scrollbar-color: rgba(150, 150, 150, 0.45) transparent;
        }
        .auto-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .auto-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .auto-scrollbar::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 2px;
        }
        .auto-scrollbar:hover::-webkit-scrollbar-thumb {
            background: rgba(150, 150, 150, 0.45);
        }

        /* 预览时的交互效果 */
        .editable-field:hover { 
            background-color: rgba(43, 71, 102, 0.05);
            box-shadow: 0 0 0 1px rgba(43, 71, 102, 0.2);
            cursor: text;
        }
        .sidebar-editable-field:hover { 
            background-color: rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.3);
            cursor: text;
        }

        /* 编辑状态 */
        .inline-editor {
            background: white !important;
            color: #333 !important;
            border: 1px solid var(--primary-blue) !important;
            border-radius: 2px !important;
            padding: 1px 4px !important;
            width: 100%;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
        }

        /* 简历 A4 容器基础定义 */
        .resume-container {
            width: 210mm;
            min-width: 210mm;
            min-height: 297mm;
            max-width: 210mm;
            background: white;
            position: relative;
            box-shadow: none;
        }

        @media screen {
            .resume-container {
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            }
        }

        /* PDF导出时的打印样式 */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            .resume-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .sidebar-box {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            .no-print {
                display: none !important;
            }
        }

        /* 全局强制保留背景色 */
        .sidebar-box {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            color-adjust: exact;
        }

        /* ===== Skill Forge 暗色主题（仅 scope 到技能分析视图） ===== */
        .skillforge-theme {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .skillforge-theme ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .skillforge-theme ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .skillforge-theme ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .skillforge-theme ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Skill Forge 动画 */
        .sf-animate-fade-in {
            animation: sf-fadeIn 0.5s ease-out;
        }
        .sf-animate-fade-in-up {
            animation: sf-fadeInUp 0.6s ease-out;
        }
        .sf-animate-slide-down {
            animation: sf-slideDown 0.3s ease-out;
        }

        @keyframes sf-fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes sf-fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes sf-slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sf-animate-slide-in-right {
            animation: sf-slideInRight 0.3s ease-out;
        }
        @keyframes sf-slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
